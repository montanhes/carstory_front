name: Deploy Vite App

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: symbols/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      # --- CONFIGURAÇÃO DE SEGURANÇA SSH ---
      - name: Setup SSH keys
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.HOSTOO_SSH_KEY }}" > ~/.ssh/id_hostoo
          echo "${{ secrets.ORACLE_SSH_KEY }}" > ~/.ssh/id_oracle
          chmod 600 ~/.ssh/id_hostoo ~/.ssh/id_oracle
          ssh-keyscan -H ${{ secrets.HOSTOO_HOST }} >> ~/.ssh/known_hosts
          ssh-keyscan -H ${{ secrets.ORACLE_HOST }} >> ~/.ssh/known_hosts

      # --- FLUXO 1: HOSTOO (Oakz) ---
      - name: Build for Hostoo
        run: npm run build

      - name: Deploy to Hostoo
        run: |
          # 1. Cria pasta temporária para o novo build
          ssh -i ~/.ssh/id_hostoo ${{ secrets.HOSTOO_USER }}@${{ secrets.HOSTOO_HOST }} "rm -rf ~/frontend_tmp && mkdir -p ~/frontend_tmp"

          # 2. Upload do conteúdo da pasta dist
          scp -i ~/.ssh/id_hostoo -r dist/. ${{ secrets.HOSTOO_USER }}@${{ secrets.HOSTOO_HOST }}:~/frontend_tmp/

          # 3. Limpeza seletiva e migração
          ssh -i ~/.ssh/id_hostoo ${{ secrets.HOSTOO_USER }}@${{ secrets.HOSTOO_HOST }} "
            cd /home/${{ secrets.HOSTOO_USER }}/public_html && \
            # O SEGREDO ESTÁ AQUI: -not -name 'carstory_api' impede a deleção do backend
            find . -maxdepth 1 -mindepth 1 -not -name '.*' -not -name 'carstory_api' -exec rm -rf {} + 2>/dev/null || true && \
            cp -r ~/frontend_tmp/. . && \
            rm -rf ~/frontend_tmp
          "

      # --- FLUXO 2: ORACLE CLOUD (Moviu) ---
      - name: Build for Oracle Cloud
        run: npm run build
        env:
          VITE_API_URL: https://api.moviu.com.br

      - name: Deploy to Oracle Cloud
        run: |
          # 1. Garantir que a pasta temporária existe e está limpa
          ssh -i ~/.ssh/id_oracle ${{ secrets.ORACLE_USER }}@${{ secrets.ORACLE_HOST }} "rm -rf ~/frontend_tmp && mkdir -p ~/frontend_tmp"
          
          # 2. Upload usando o ponto (.) para garantir que o conteúdo de dist vá para dentro de frontend_tmp
          scp -i ~/.ssh/id_oracle -r dist/. ${{ secrets.ORACLE_USER }}@${{ secrets.ORACLE_HOST }}:~/frontend_tmp/
          
          # 3. Mover para a pasta final usando sudo e ajustando permissões
          ssh -i ~/.ssh/id_oracle ${{ secrets.ORACLE_USER }}@${{ secrets.ORACLE_HOST }} "
            # CUIDADO: Se no futuro o backend da Oracle também ficar na mesma pasta, 
            # você precisará aplicar a mesma lógica do 'find' aqui em vez do 'rm -rf *'
            sudo rm -rf ${{ secrets.ORACLE_FRONTEND_PATH }}/*
            
            # Copia o conteúdo da tmp para o destino
            sudo cp -r ~/frontend_tmp/. ${{ secrets.ORACLE_FRONTEND_PATH }}/
            
            # Ajusta permissões para o Nginx (www-data)
            sudo chown -R www-data:www-data ${{ secrets.ORACLE_FRONTEND_PATH }}
            sudo chmod -R 755 ${{ secrets.ORACLE_FRONTEND_PATH }}
            
            # Limpa a temporária
            rm -rf ~/frontend_tmp
          "