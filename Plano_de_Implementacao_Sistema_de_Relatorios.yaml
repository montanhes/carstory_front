 ---
 Performance e Otimizações

 1. Eager Loading: with(['vehicle', 'user']) quando necessário
 2. Agregações SQL: Usar DB::raw() para cálculos complexos
 3. Índices: vehicle_expenses já tem índices em (user_id, expense_date), (expense_category, expense_date)
 4. Cache: Considerar cache de 5 minutos para relatórios pesados (Fase 3)
 5. Paginação: Usar em extratos detalhados

 ---
 Validação e Testes

 Testes Comuns em Todos os Relatórios

 - ✓ Usuário não autenticado retorna 401
 - ✓ Usuário vê apenas seus dados (authorization)
 - ✓ Filtros de data funcionam corretamente
 - ✓ Filtros de veículo funcionam
 - ✓ Response tem estrutura esperada
 - ✓ Dados são calculados corretamente (fixtures conhecidos)

 Quality Gates

 sail artisan test --coverage          # Coverage > 80%
 sail composer pint                    # Code style
 sail composer phpstan                 # Static analysis


