 Plano de Implementação: Sistema de Relatórios Moviu API

 Contexto

 O usuário solicitou a implementação de um sistema completo de relatórios para a API Moviu em 3 fases de priorização (Essenciais, Análise, Avançados). O sistema deve fornecer endpoints REST que retornam dados formatados para serem consumidos por um frontend React com Chart.js.

 Problema a resolver:
 - Falta de insights sobre despesas de veículos
 - Ausência de análises consolidadas e comparativas
 - Necessidade de visualizações gráficas para tomada de decisão

 Resultado esperado:
 - 12 endpoints de relatórios organizados em 3 fases
 - Dados otimizados para Chart.js
 - Seguir padrões do projeto (TDD, Sanctum, validação)
 - Documentação completa para frontend React

