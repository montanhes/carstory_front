 Documentação para Frontend (React + Chart.js)

 Ao final da implementação, gerar documento REPORTS_API.md contendo:

 1. Lista de Endpoints: URL, método, autenticação
 2. Request/Response Examples: JSON completo
 3. Query Params: nome, tipo, obrigatório, valores aceitos
 4. Estrutura Chart.js: mapeamento direto response → Chart.js config
 5. Códigos de Status HTTP: significado de cada código
 6. Exemplos de Integração React:
 import { Line } from 'react-chartjs-2';

 const response = await fetch('/api/reports/dashboard', {
   headers: { 'Authorization': `Bearer ${token}` }
 });
 const data = await response.json();

 <Line data={data.expenses_over_time} />
 7. Tratamento de Erros: como lidar com 401, 403, 422
 8. Loading States: endpoints que podem demorar
 9. Filtros: exemplos de construção de query strings

 ---
 Riscos e Mitigações

 ┌─────────────────────────────────────────────┬─────────────────────────────────────────────────┐
 │                    Risco                    │                    Mitigação                    │
 ├─────────────────────────────────────────────┼─────────────────────────────────────────────────┤
 │ Performance ruim em agregações grandes      │ Implementar cache de 5min, adicionar índices    │
 ├─────────────────────────────────────────────┼─────────────────────────────────────────────────┤
 │ Dados inconsistentes (despesas sem veículo) │ Cascade delete já configurado, adicionar testes │
 ├─────────────────────────────────────────────┼─────────────────────────────────────────────────┤
 │ Divisão por zero em médias                  │ Validar count > 0 antes de calcular             │
 ├─────────────────────────────────────────────┼─────────────────────────────────────────────────┤
 │ Datas inválidas em filtros                  │ ReportFilterRequest com validação rigorosa      │
 ├─────────────────────────────────────────────┼─────────────────────────────────────────────────┤
 │ Sobrecarga de testes                        │ Foco em happy path + edge cases principais      │
 └─────────────────────────────────────────────┴─────────────────────────────────────────────────┘

