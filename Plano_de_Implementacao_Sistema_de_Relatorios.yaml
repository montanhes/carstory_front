 ---
 Passos de Implementação (Ordem TDD)

 Setup Inicial

 1. Ativar RefreshDatabase no Pest.php
 uses(Tests\TestCase::class, Illuminate\Foundation\Testing\RefreshDatabase::class)
     ->in('Feature');
 2. Criar ReportFilterRequest
   - Validar datas (Y-m-d format)
   - Validar vehicle_id (exists:vehicles,id + pertence ao usuário)
   - Validar category, expense_type, payment_method (enums)
 3. Criar VehicleExpenseRepository
   - Interface + Implementação
   - Binding no RepositoryServiceProvider
 4. Criar ReportController vazio
   - Constructor injection do VehicleExpenseRepository
   - Skeleton de todos os métodos
 5. Adicionar rotas em api.php
 Route::middleware('auth:sanctum')->prefix('reports')->group(function () {
     Route::get('dashboard', [ReportController::class, 'dashboard']);
     Route::get('expenses/by-category', [ReportController::class, 'expensesByCategory']);
     // ... etc
 });

 Fase 1 (Essenciais) - 4 relatórios

 Por cada relatório:
 1. Criar teste Feature (RED)
 2. Criar Service
 3. Implementar método no Controller
 4. Rodar teste (GREEN)
 5. Refatorar queries para performance
 6. Rodar Pint + PHPStan

 Fase 2 (Análise) - 4 relatórios

 Mesmo workflow da Fase 1.

 Fase 3 (Avançados) - 4 relatórios

 Para relatório de Orçamento:
 - Criar migration budgets table
 - Criar model Budget
 - Criar CRUD de orçamentos (separado)

