 Decisões Arquiteturais

 1. Services Layer: Criar app/Services/Reports/ para isolar lógica de agregação e cálculos
 2. Repository Pattern: Criar VehicleExpenseRepository para manter consistência com VehicleRepository
 3. Form Request: Criar ReportFilterRequest para validar filtros comuns (datas, vehicle_id, etc)
 4. Response Format: Arrays simples compatíveis com Chart.js
 5. Autorização: Todos os relatórios filtram por user_id = Auth::id()

